<script>
  document.addEventListener('DOMContentLoaded', () => {
    // --- Configuration for Hour Counter ---
    const baseHours = 250; // The starting number of hours.
    const weeklyHours = 15; // Hours to add per week.
    // Set the "start date" for the calculation. This date is *inclusive*.
    const startDate = new Date('2025-11-09T00:00:00');
    // --- End Configuration ---
    function calculateTotalHours() {
      let totalHours = baseHours;
      const today = new Date();
      today.setHours(0, 0, 0, 0); // Normalize today to start of day
      let currentDate = new Date(startDate.getTime());
      currentDate.setHours(0, 0, 0, 0); // Normalize start date
      const msPerWeek = 7 * 24 * 60 * 60 * 1000;
      const weeks = Math.floor((today - currentDate) / msPerWeek);
      if (weeks > 0) {
        totalHours += weeklyHours * weeks;
      }
      return totalHours;
    }
    function animateCounter(targetValue) {
      const counterElement = document.getElementById('hours-counter');
      if (!counterElement) return;
      const duration = 2000; // Animation duration in milliseconds
      let startTimestamp = null;
      const startValue = baseHours; // Start animation from baseHours
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
       
        const currentValue = Math.floor(progress * (targetValue - startValue) + startValue);
       
        counterElement.textContent = currentValue.toLocaleString();
       
        if (progress < 1) {
          window.requestAnimationFrame(step);
        } else {
          // Ensure final value is set
          counterElement.textContent = targetValue.toLocaleString();
        }
      };
     
      window.requestAnimationFrame(step);
    }
   
    // Run the calculator and animator
    const finalHours = calculateTotalHours();
    animateCounter(finalHours);
   
  });
</script>
